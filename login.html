<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Hay Farm Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200..1000&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Nunito', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #175D2B 0%, #4CAF50 50%, #c9d8cf 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 50px;
            width: 100%;
            max-width: 420px;
            animation: slideUp 0.8s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(40px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .login-header h2 {
            color: #175D2B;
            font-weight: 800;
            font-size: 28px;
            margin-bottom: 8px;
        }

        .login-header p {
            color: #666;
            font-size: 16px;
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        .form-control {
            width: 100%;
            padding: 15px 20px 15px 50px;
            border: 2px solid #e8f5e9;
            border-radius: 12px;
            font-size: 16px;
            transition: all 0.3s ease;
            background: #f8f9fa;
        }

        .form-control:focus {
            outline: none;
            border-color: #175D2B;
            background: white;
            box-shadow: 0 0 0 4px rgba(23, 93, 43, 0.1);
            transform: translateY(-2px);
        }

        .input-icon {
            position: absolute;
            left: 18px;
            top: 65%;
            transform: translateY(-50%);
            color: #999;
            font-size: 18px;
            z-index: 2;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #175D2B, #4CAF50);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(23, 93, 43, 0.4);
            background: linear-gradient(135deg, #145024, #45a049);
        }

        .login-footer {
            text-align: center;
            margin-top: 25px;
            padding-top: 25px;
            border-top: 1px solid #eee;
        }

        .login-footer p {
            color: #888;
            font-size: 14px;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 4px solid #f44336;
            display: none;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .remember-me input[type="checkbox"] {
            width: 18px;
            height: 18px;
            accent-color: #175D2B;
        }
    </style>
</head>
<body>
    <div class="login-container">
        
        <div class="login-header">
            <h2>Selamat Datang</h2>
            <p>Masuk ke sistem admin Hay Farm</p>
        </div>

        <div id="errorMsg" class="error-message">
            <i class="fas fa-exclamation-triangle"></i>
            Username atau password salah!
        </div>

        <form id="loginForm">
            <div class="form-group">
                <label>Username</label>
                <i class="fas fa-user input-icon"></i>
                <input type="text" class="form-control" placeholder="Masukkan username" required>
            </div>

            <div class="form-group position-relative">
                <label>Password</label>
                <i class="fas fa-lock input-icon"></i>
                <input type="password" id="loginPassword" class="form-control" style="padding-right: 50px;" placeholder="Masukkan password" required>
                <i class="fas fa-eye toggle-password" id="toggleLoginPassword" style="position: absolute; right: 18px; top: 65%; transform: translateY(-50%); color: #999; font-size: 18px; cursor: pointer; z-index: 2;" title="Show password"></i>
            </div>

            <div class="remember-me">
                <input type="checkbox" id="remember">
                <label for="remember">Ingat saya</label>
            </div>

            <button type="submit" class="btn-login">
                Masuk ke Sistem
            </button>
        </form>

        <div class="login-footer">
            <p>Belum punya akun? <a href="register.html" style="color: #175D2B; font-weight: 600; text-decoration: none;" onmouseover="this.style.textDecoration='underline'" onmouseout="this.style.textDecoration='none'">Daftar sekarang</a></p>
            <p>&copy; 2025 Hay Farm. Semua hak dilindungi.</p>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const errorMsg = document.getElementById('errorMsg');

        // Password toggle
        const toggleLoginPassword = document.getElementById('toggleLoginPassword');
        const loginPassword = document.getElementById('loginPassword');
        toggleLoginPassword.addEventListener('click', function() {
            const type = loginPassword.getAttribute('type') === 'password' ? 'text' : 'password';
            loginPassword.setAttribute('type', type);
            this.classList.toggle('fa-eye');
            this.classList.toggle('fa-eye-slash');
        });

        // Demo credentials: username: admin, password: hayfarm123
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = this.querySelector('input[type="text"]').value;
            const password = loginPassword.value;
            
            if (username === 'admin' && password === 'hayfarm123') {
                // Redirect to dashboard
                window.location.href = 'index.html';
            } else {
                errorMsg.style.display = 'block';
                setTimeout(() => {
                    errorMsg.style.display = 'none';
                }, 4000);
            }
        });

        // Auto focus username
        form.querySelector('input[type="text"]').focus();
    </script>
</body>
</html>
